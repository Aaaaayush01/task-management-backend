<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskForge — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───────────── SIDEBAR ───────────── -->
   
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-mark">▲</span>
        <span class="logo-text">TaskForge</span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <span class="theme-icon">◐</span>
      </button>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">WORKSPACE</p>
      <div class="projects-list" id="projectsList"></div>
      <button class="btn-new-project" id="btnNewProject">
        <span>+</span> New Project
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-lbl">Tasks</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statDone">0</span>
          <span class="stat-lbl">Done</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statPct">0%</span>
          <span class="stat-lbl">Progress</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
  </aside>

  <!-- ───────────── MAIN ───────────── -->
  <main class="main" id="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <div class="breadcrumb">
          <span class="breadcrumb-app">TaskForge</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-project" id="breadcrumbProject">Select a project</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="searchInput" type="text" placeholder="Search tasks…" />
          <kbd class="search-kbd">/</kbd>
        </div>
        <div class="filter-wrap" id="filterWrap">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="high">🔴 High</button>
          <button class="filter-btn" data-filter="medium">🟡 Med</button>
          <button class="filter-btn" data-filter="low">🟢 Low</button>
        </div>
        <button class="btn-add-task" id="btnAddTask">
          <span>+</span> Add Task
        </button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </div>
      
    </header>

    <!-- KANBAN BOARD -->
    <section class="board" id="board">

      <div class="column" data-status="pending" id="col-pending">
        <div class="column-header">
          <div class="col-title-wrap">
            <span class="col-dot pending-dot"></span>
            <h2 class="col-title">Backlog</h2>
          </div>
          <span class="col-count" id="count-pending">0</span>
        </div>
        <div class="task-list" id="list-pending" 
             ondragover="event.preventDefault()" 
             ondragenter="handleDragEnter(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event, 'pending')">
        </div>
        <button class="col-add-btn" data-status="pending">+ Add task</button>
      </div>

      <div class="column" data-status="inprogress" id="col-inprogress">
        <div class="column-header">
          <div class="col-title-wrap">
            <span class="col-dot inprogress-dot"></span>
            <h2 class="col-title">In Progress</h2>
          </div>
          <span class="col-count" id="count-inprogress">0</span>
        </div>
        <div class="task-list" id="list-inprogress"
             ondragover="event.preventDefault()"
             ondragenter="handleDragEnter(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event, 'inprogress')">
        </div>
        <button class="col-add-btn" data-status="inprogress">+ Add task</button>
      </div>

      <div class="column" data-status="done" id="col-done">
        <div class="column-header">
          <div class="col-title-wrap">
            <span class="col-dot done-dot"></span>
            <h2 class="col-title">Done</h2>
          </div>
          <span class="col-count" id="count-done">0</span>
        </div>
        <div class="task-list" id="list-done"
             ondragover="event.preventDefault()"
             ondragenter="handleDragEnter(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event, 'done')">
        </div>
        <button class="col-add-btn" data-status="done">+ Add task</button>
      </div>

    </section>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">▲</div>
      <h3>No project selected</h3>
      <p>Create or select a project from the sidebar to get started.</p>
      <button class="btn-empty-create" id="btnEmptyCreate">Create your first project</button>
    </div>

  </main>

  <!-- ───────────── MODALS ───────────── -->

  <!-- New Project Modal -->
  <div class="modal-backdrop" id="modalProject">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 class="modal-title">New Project</h3>
        <button class="modal-close" data-close="modalProject">✕</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Project Name</label>
        <label class="field-label" style="margin-top:1.2rem">Color Tag</label>
        <div class="color-picker" id="projectColorPicker">
          <button class="color-swatch active" data-color="#F59E0B" style="background:#F59E0B"></button>
          <button class="color-swatch" data-color="#EF4444" style="background:#EF4444"></button>
          <button class="color-swatch" data-color="#8B5CF6" style="background:#8B5CF6"></button>
          <button class="color-swatch" data-color="#10B981" style="background:#10B981"></button>
          <button class="color-swatch" data-color="#3B82F6" style="background:#3B82F6"></button>
          <button class="color-swatch" data-color="#EC4899" style="background:#EC4899"></button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" data-close="modalProject">Cancel</button>
        <button class="btn-primary" id="btnCreateProject">Create Project</button>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div class="modal-backdrop" id="modalTask">
    <div class="modal modal-large" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 class="modal-title" id="taskModalTitle">New Task</h3>
        <button class="modal-close" data-close="modalTask">✕</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Task Title <span class="required">*</span></label>
        <input class="field-input" id="taskTitleInput" type="text" placeholder="What needs to be done?" maxlength="80" />

        <label class="field-label" style="margin-top:1.2rem">Description</label>
        <textarea class="field-textarea" id="taskDescInput" placeholder="Add more context, links, notes…" rows="3"></textarea>

        <div class="field-row">
          <div class="field-col">
            <label class="field-label">Priority</label>
            <div class="priority-selector" id="prioritySelector">
              <button class="priority-btn" data-priority="low">🟢 Low</button>
              <button class="priority-btn active" data-priority="medium">🟡 Medium</button>
              <button class="priority-btn" data-priority="high">🔴 High</button>
            </div>
          </div>
          <div class="field-col">
            <label class="field-label">Due Date</label>
            <input class="field-input" id="taskDueInput" type="date" />
          </div>
        </div>

        <label class="field-label" style="margin-top:1.2rem">Status</label>
        <div class="status-selector" id="statusSelector">
          <button class="status-btn active" data-status="pending">Backlog</button>
          <button class="status-btn" data-status="inprogress">In Progress</button>
          <button class="status-btn" data-status="done">Done</button>
        </div>

        <!-- Subtasks -->
        <div class="subtask-section">
          <label class="field-label">Subtasks</label>
          <div class="subtask-list" id="subtaskList"></div>
          <div class="subtask-add-row">
            <input class="field-input subtask-input" id="subtaskInput" type="text" placeholder="Add a subtask…" />
            <button class="btn-ghost btn-sm" id="btnAddSubtask">Add</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="btnDeleteTask" style="margin-right:auto;display:none">Delete</button>
        <button class="btn-ghost" data-close="modalTask">Cancel</button>
        <button class="btn-primary" id="btnSaveTask">Save Task</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
  <script src="authCheck.js"></script>
</body>
</html>
